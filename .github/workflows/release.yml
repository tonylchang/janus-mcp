name: release

# Publishes to PyPI via Trusted Publishing (OIDC — no API tokens stored).
# One-time setup on pypi.org: project settings -> Publishing -> add GitHub
# publisher (owner: tonylchang, repo: janus-mcp, workflow: release.yml,
# environment: pypi).
#
# To release: bump `version` in pyproject.toml, tag `vX.Y.Z`, push the tag.
#
# Actions are pinned by commit SHA (the tag comment is informational).

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check . && uv run mypy && uv run pytest -q
      - name: audit dependencies (OSV)
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --lockfile=uv.lock
      - run: uv build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
